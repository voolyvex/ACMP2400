name: CI Pipeline
on:
  workflow_dispatch
permissions: {}
jobs:  

  build-and-curl:
    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd 
      - name: docker_build
        run: |
          docker build -t pipeline-test .
      - name: docker_run
        env:
          # Pull from gh Secrets into the runner's shell env
          DJANGO_SECRET_KEY: ${{ vars.DJANGO_SECRET_KEY }}
        run: |
          docker run -d --name curl-app -p 8000:8000 -e DJANGO_SECRET_KEY="$DJANGO_SECRET_KEY" pipeline-test
          sleep 7
      - name:  curl_ftw
        run: |
          curl -f http://localhost:8000/

  sbom-scan-and-test:

    runs-on: ubuntu-latest
    steps:
      - name: get_code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd 
      - name: sbom_gen_and_scan
        uses: ./.github/actions/sbom-scan 
      - name:  upload_sbom
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: project-sbom
          path: sbom.json
          compression-level: 0
           